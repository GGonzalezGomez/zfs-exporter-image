name: Build and Push Docker Image
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
        
    - name: Read version from file
      id: get_version
      run: |
        VERSION=$(cat version)
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # Pasamos la versión leída del archivo al Dockerfile
        build-args: |
          EXPORTER_VERSION=${{ steps.get_version.outputs.VERSION }}
        tags: |
          ggongom/zfs-exporter:${{ steps.get_version.outputs.VERSION }}
          ggongom/zfs-exporter:latest